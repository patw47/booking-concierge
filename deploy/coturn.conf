# coturn — minimal config for WebRTC TURN relay
# Required for 4G / strict symmetric NAT clients.
# Install: sudo apt install coturn
# Enable: echo "TURNSERVER_ENABLED=1" >> /etc/default/coturn
# Place at: /etc/turnserver.conf
# Start: sudo systemctl enable coturn && sudo systemctl start coturn
#
# UFW rules needed:
#   sudo ufw allow 3478/tcp && sudo ufw allow 3478/udp
#   sudo ufw allow 5349/tcp && sudo ufw allow 5349/udp
#   sudo ufw allow 49152:65535/udp

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
external-ip=77.42.72.164

# Media relay port range
min-port=49152
max-port=65535

# Long-term credential auth
realm=code-art.ch
lt-cred-mech
user=turnuser:REPLACE_TURN_PASSWORD

# WebRTC compatibility
fingerprint
no-multicast-peers

log-file=/var/log/coturn.log
