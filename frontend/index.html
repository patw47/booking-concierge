<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Villa Eden Bleu — Voice Concierge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #0a4f6e 0%, #1a7a9a 50%, #2da5c5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 1.8rem; margin-bottom: 6px; }
    .subtitle { font-size: 0.95rem; opacity: 0.75; margin-bottom: 36px; }
    #status { font-size: 0.85rem; opacity: 0.65; margin-bottom: 24px; min-height: 20px; }
    button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.97); }
    #btn-connect {
      background: #fff;
      color: #0a4f6e;
      font-weight: 600;
    }
    #btn-disconnect {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      display: none;
    }
    .pulse {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Villa Eden Bleu</h1>
    <p class="subtitle">Voice Concierge · Ask about availability, amenities &amp; booking</p>
    <p id="status">Ready to connect</p>
    <button id="btn-connect">🎙️ Talk to the concierge</button>
    <button id="btn-disconnect"><span class="pulse"></span> Disconnect</button>
  </div>
  <audio id="bot-audio" autoplay playsinline style="display:none"></audio>

  <script>
    const BASE_URL = window.location.origin;
    const btnConnect = document.getElementById('btn-connect');
    const btnDisconnect = document.getElementById('btn-disconnect');
    const statusEl = document.getElementById('status');
    const botAudio = document.getElementById('bot-audio');

    let pc = null;
    let pcId = null;

    function setStatus(msg) { statusEl.textContent = msg; }

    function onDisconnected() {
      if (pc) { pc.close(); pc = null; }
      pcId = null;
      botAudio.srcObject = null;
      btnConnect.style.display = 'inline-flex';
      btnConnect.disabled = false;
      btnDisconnect.style.display = 'none';
      setStatus('Disconnected');
    }

    btnConnect.onclick = async () => {
      btnConnect.disabled = true;
      setStatus('Requesting microphone…');
      try {
        // Microphone access first (user gesture already consumed by click)
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

        setStatus('Fetching ICE configuration…');
        const { iceServers } = await fetch(`${BASE_URL}/api/ice-config`).then(r => r.json());

        pc = new RTCPeerConnection({ iceServers });

        // Play bot audio as soon as a track arrives
        pc.ontrack = e => {
          if (e.streams && e.streams[0]) {
            botAudio.srcObject = e.streams[0];
            botAudio.play().catch(() => {});
          }
        };

        pc.onconnectionstatechange = () => {
          if (pc.connectionState === 'connected') {
            setStatus('Connected — speak now');
            btnConnect.style.display = 'none';
            btnDisconnect.style.display = 'inline-flex';
          } else if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
            onDisconnected();
          }
        };

        // Add mic track — creates sendrecv transceiver so we also receive bot audio
        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        setStatus('Gathering ICE candidates…');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        // Wait for ICE gathering to finish (max 10 s) before sending offer
        await new Promise(resolve => {
          if (pc.iceGatheringState === 'complete') { resolve(); return; }
          pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === 'complete') resolve();
          };
          setTimeout(resolve, 10000);
        });

        setStatus('Connecting to concierge…');
        const resp = await fetch(`${BASE_URL}/api/offer`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sdp: pc.localDescription.sdp, type: pc.localDescription.type }),
        });

        if (!resp.ok) { throw new Error(`Server error ${resp.status}`); }
        const answer = await resp.json();
        pcId = answer.pc_id;

        await pc.setRemoteDescription({ sdp: answer.sdp, type: answer.type });

      } catch (e) {
        setStatus(`Error: ${e.message}`);
        if (pc) { pc.close(); pc = null; }
        btnConnect.disabled = false;
      }
    };

    btnDisconnect.onclick = () => {
      if (pc) { pc.close(); }
      onDisconnected();
    };
  </script>
</body>
</html>
